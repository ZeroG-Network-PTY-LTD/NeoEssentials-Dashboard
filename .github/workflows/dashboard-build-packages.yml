name: Dashboard — build installer/updater packages

# Builds both dashboard/dist/*_installer.zip and *-updater.zip (see
# dashboard/bin/build-installer.ps1) and publishes them as a NEW,
# uniquely-tagged GitHub Release per build (dashboard-<shortsha>) — not a
# single rolling release. Each one is kept permanently, so the repo's
# Releases page doubles as the version history, and the dashboard's own
# Updates page can offer a "downgrade to an older version" picker built
# from that same list (SelfUpdateService::listGithubReleases()). The
# newest build is flagged make_latest, so /releases/latest — what
# SelfUpdateService::checkGithubRelease() checks for the *recommended*
# update — always resolves to it without any extra bookkeeping.
#
# Runs on windows-latest specifically so build-installer.ps1 (Windows
# PowerShell 5.1 syntax — see its own comments on Join-Path/RNG quirks)
# runs unmodified, the same script a maintainer would run locally.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          # Matches composer.json's require.php — composer.lock is actually
          # resolved against Symfony 8.0.x, which needs PHP >=8.4.
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite, curl, fileinfo, zip, ctype, json, tokenizer, openssl
          tools: composer:v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute short SHA
        id: vars
        shell: bash
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build installer package
        shell: pwsh
        run: ./bin/build-installer.ps1 -Kind installer -Version "${{ steps.vars.outputs.sha }}"

      - name: Build updater package
        shell: pwsh
        run: ./bin/build-installer.ps1 -Kind updater -Version "${{ steps.vars.outputs.sha }}"

      - name: Publish dated release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dashboard-${{ steps.vars.outputs.sha }}
          name: Dashboard ${{ steps.vars.outputs.sha }}
          body: |
            Built from commit ${{ github.sha }} on `main`.

            - `*_installer.zip` — fresh deploy to shared/cPanel hosting (see dashboard/INSTALL.md)
            - `*-updater.zip` — available from the dashboard's own Updates page (as the recommended
              update if this is the newest release, or under "choose a version" otherwise)
          make_latest: true
          prerelease: false
          files: |
            dashboard/dist/*_installer.zip
            dashboard/dist/*-updater.zip
