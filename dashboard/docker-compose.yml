services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Point at your NeoEssentials server's dashboard API. Use host.docker.internal
      # if the mod runs on the same machine as Docker (Linux: add
      # "extra_hosts: - host.docker.internal:host-gateway" below).
      MC_API_URL: "http://host.docker.internal:8642"
      # Pairing credentials (API key, webhook token, WS port) live in the mc_connection DB
      # table, not env vars — persisted by the dashboard-data volume below across restarts.
    volumes:
      # Persist the SQLite DB and app key across container restarts/rebuilds.
      - dashboard-data:/app/database
      - dashboard-storage:/app/storage

volumes:
  dashboard-data:
  dashboard-storage: